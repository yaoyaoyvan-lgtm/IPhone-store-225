<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iPhone Store 225 - iPhones Wi-Fi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* --- Styles Généraux --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f7;
            color: #1d1d1f;
        }

        /* --- Barre de Navigation (Header) --- */
        header {
            background-color: #111;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        header .logo {
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        header .logo span {
            color: #0071e3;
        }

        header .nav-icons {
            display: flex;
            gap: 20px;
            font-size: 1.2rem;
        }

        header .nav-icons i {
            cursor: pointer;
            transition: color 0.3s;
        }

        header .nav-icons i:hover {
            color: #0071e3;
        }

        /* --- Bannière d'Accueil (Hero Section) --- */
        .hero {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1510557880182-3d4d3cba35a5?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;
            height: 250px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 20px;
        }

        .hero h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .hero p {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* --- Section Produits --- */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 1.5rem;
            margin-bottom: 25px;
            text-align: center;
        }

        /* Grille Responsive */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        /* Carte Produit --- */
        .product-card {
            background: white;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .product-image {
            width: 100%;
            height: 220px;
            background-color: #fbfbfd;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

            max-width: 100%;
            max-height: 100%;
